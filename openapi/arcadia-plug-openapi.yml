          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleEnrollmentsArray'
        '403':
          description: ForbiddenError
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '422':
          description: Unprocessable Entity
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/SandboxBundleEnrollmentError'
                - $ref: '#/components/schemas/InvalidResourceError'
  /sandbox/bundle/utility_remittance/utility_credentials/{utility_credential_id}/reject:
    post:
      tags:
      - Bundle (Beta)
      summary: Sandboxed Only, Utility Remittance - Reject pending Utility Remittance
        enrollment
      description: 'Only available when using sandboxed API keys.

        Updates the Bundle Enrollments [created by the enroll into Utility Remittance
        endpoint](enrollutilityremittance) for each Utility Account associated with
        this Utility Credential. The status will change from `pending_enrollment`
        to `ineligible` and trigger the `utility_remittance_not_available` Webhook
        Event.

        '
      operationId: sandboxUtilityRemittanceReject
      parameters:
      - $ref: '#/components/parameters/utilityCredentialIdInPathParam'
      - $ref: '#/components/parameters/arcVersionInHeaderParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - ineligibility_reasons
              properties:
                ineligibility_reasons:
                  type: array
                  items:
                    $ref: '#/components/schemas/IneligibilityReasonEnum'
      responses:
        '200':
          description: Success
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleEnrollmentsArray'
        '403':
          description: ForbiddenError
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '422':
          description: Unprocessable Entity
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/SandboxBundleRejectReasonsError'
                - $ref: '#/components/schemas/UnpermittedParametersError'
                - $ref: '#/components/schemas/SandboxBundleEnrollmentError'
                - $ref: '#/components/schemas/InvalidResourceError'
  /sandbox/bundle/utility_remittance/utility_credentials/{utility_credential_id}/remove:
    post:
      tags:
      - Bundle (Beta)
      summary: Sandboxed Only, Utility Remittance - Remove active or pending removal
        Utility Remittance enrollment
      description: 'Only available when using sandboxed API keys.

        Updates the Bundle Enrollments [created by the enroll into Utility Remittance
        endpoint](enrollutilityremittance) for each Utility Account associated with
        this Utility Credential. The status will change from `enrolled` or `pending_removal`
        to `removed` and trigger the `utility_remittance_removed` Webhook Event.

        '
      operationId: sandboxUtilityRemittanceRemove
      parameters:
      - $ref: '#/components/parameters/utilityCredentialIdInPathParam'
      - $ref: '#/components/parameters/arcVersionInHeaderParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - removal_reason
              properties:
                removal_reason:
                  type: string
                  enum:
                  - organization_requested
                  - dropped_cant_login
                  - dropped_no_remittance_scheduled
      responses:
        '200':
          description: Success
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleEnrollmentsArray'
        '403':
          description: ForbiddenError
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '422':
          description: Unprocessable Entity
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/SandboxBundleRemoveReasonError'
                - $ref: '#/components/schemas/UnpermittedParametersError'
                - $ref: '#/components/schemas/SandboxBundleEnrollmentError'
                - $ref: '#/components/schemas/InvalidResourceError'
  /sandbox/connect/submit_test_credentials:
    post:
      tags:
      - Utility Credentials
      summary: Submit test credentials
      description: 'Submit test credentials in the sandbox environment


        The request should authenticate with a Bearer token from the [Connect Token
        endpoint](ref:createconnecttoken), provisioned in the same manner as it would
        be for front-end use with Connect.

        '
      operationId: submitTestCredentials
      parameters:
      - $ref: '#/components/parameters/arcVersionInHeaderParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - password
              - utility_id
              - zip
              properties:
                username:
                  type: string
                password:
                  type: string
                account_number:
                  type: string
                  description: Alternative to username/password, for use with ConEd
                utility_id:
                  type: string
                  description: Arcadia identifier for the desired utility, found in
                    the [Supported Utilities section](#section/Supported-Utilities).
                zip:
                  type: string
                  description: Zip code of the test utility account service address.
                    This can influence tariffs under some utilities.
      responses:
        '201':
          description: Success
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtilityCredential'
  /sandbox/webhook/trigger/new_utility_statement_available:
    post:
      tags:
      - Webhooks
      summary: Trigger a new_utility_statement_available webhook event
      description: 'This endpoint will create a new utility statement for the associated
        utility account and emit a new_utility_statement_available webhook event.


        Only available in sandbox.

        '
      operationId: triggerNewUtilityStatementAvailable
      parameters:
      - $ref: '#/components/parameters/arcVersionInHeaderParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - utility_account_id
              properties:
                utility_account_id:
                  type: integer
      responses:
        '202':
          description: Success
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
        '422':
          description: Unprocessable Entity
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookTriggerError'
  /sandbox/webhook/trigger/new_utility_intervals_available:
    post:
      tags:
      - Webhooks
      summary: Trigger a new_utility_intervals_available webhook event
      description: 'This endpoint will emit a new_utility_intervals_available webhook
        event.


        Note: While the new_utility_statement_available trigger creates a new utility
        statement record, the new_utility_intervals_available trigger does not generate
        new interval data records. Instead, the new_utility_intervals_available trigger
        simply creates an event for existing interval data. New interval data is added-on
        to test account interval data records daily.


        Only available for sandboxed UtilityAccounts with test scenario interval data.

        '
      operationId: triggerNewUtilityIntervalsAvailable
      parameters:
      - $ref: '#/components/parameters/arcVersionInHeaderParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - utility_account_id
              properties:
                utility_account_id:
                  type: integer
      responses:
        '202':
          description: Success
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
        '422':
          description: Unprocessable Entity
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookTriggerError'
  /sandbox/webhook/trigger/utility_credential_revoked:
    post:
      tags:
      - Webhooks
      summary: Trigger a utility_credential_revoked webhook event
      description: 'This endpoint will revoke a given utility credential (mimicing
        the severance of a customer''s connection with a utility, typically due to
        a change in password) and emit a utility_credential_revoked webhook event.


        Only available in sandbox.

        '
      operationId: triggerUtilityCredentialRevoked
      parameters:
      - $ref: '#/components/parameters/arcVersionInHeaderParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - utility_credential_id
              properties:
                utility_credential_id:
                  type: integer
      responses:
        '202':
          description: Success
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
        '422':
          description: Unprocessable Entity
          headers:
            Arcadia-Version:
              $ref: '#/components/headers/ArcVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookTriggerError'
webhooks:
  utilityCredentialVerified:
    post:
      summary: Utility Credential Verified
      description: Webhook posted when a utility credential has been verified. The
        utility credential verification status is `verified`. The `id` field represents
        a utility credential (`utility_credential_id`) that is associated with the
        user whose `client_user_id` is in the data object.
      operationId: utilityCredentialVerified
      tags:
      - Webhook Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtilityCredentialVerifiedWebhookEvent'
  utilityCredentialRejected:
    post:
      summary: Utility Credential Rejected
      description: Webhook posted when a utility credential has been initially rejected.
        The utility credential verification status is `rejected`. The `id` field represents
        a utility credential (`utility_credential_id`) that is associated with the
        user whose `client_user_id` is in the data object.
      operationId: utilityCredentialRejected
      tags:
      - Webhook Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtilityCredentialRejectedWebhookEvent'
  utilityCredentialRevoked:
    post:
      summary: Utility Credential Revoked
      description: Webhook posted when a utility credential is no longer correct.
        The utility credential verification status is `rejected`. The `id` field represents
        a utility credential (`utility_credential_id`) that is associated with the
        user whose `client_user_id` is in the data object.
      operationId: utilityCredentialRevoked
      tags:
      - Webhook Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtilityCredentialRevokedWebhookEvent'
  UtilityCredentialVerificationError:
    post:
      summary: Utility Credential Verification Error
      description: 'Webhook posted when an error was encountered attempting to verify
        the utility credentials.

        See the description of `verification_status` in the Response section of [Get
        Utility Credential](#operation/getUtilityCredential) for more information.
        The `id` field represents a utility credential (`utility_credential_id`) that
        is associated with the user whose `client_user_id` is in the data object.'
      operationId: utilityCredentialVerificationError
      tags:
      - Webhook Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtilityCredentialVerificationErrorWebhookEvent'
  utilityAccountsDiscovered:
    post:
      summary: Utility Accounts Discovered
      description: Webhook posted when utility accounts are discovered.
      operationId: utilityAccountsDiscovered
      tags:
      - Webhook Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtilityAccountsDiscoveredWebhookEvent'
  utilityAccountsDiscoveryError:
    post:
      summary: Utility Account Discovery Error
      description: Webhook posted when there is an error discovering utility accounts.
      operationId: utilityAccountsDiscoveryError
      tags:
      - Webhook Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtilityAccountsDiscoveryErrorWebhookEvent'
  historicalUtilityIntervalsDiscovered:
    post:
      summary: Historical Utility Intervals Discovered
      description: Webhook posted when historical utility intervals are discovered.
      operationId: HistoricalUtilityIntervalsDiscovered
      tags:
      - Webhook Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoricalUtilityIntervalsDiscoveredWebhookEvent'
  newUtilityIntervalsAvailable:
    post:
      summary: New Utility Intervals Available
      description: Webhook posted when new utility intervals are available.
      operationId: NewUtilityIntervalsAvailable
      tags:
      - Webhook Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUtilityIntervalsAvailableWebhookEvent'
  utilityAccountUpdated:
    post:
      summary: Utility Account Updated
      description: Webhook posted when any information changes on a utility account
