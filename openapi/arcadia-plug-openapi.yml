            provided if searching for tariffs by Genability `lse_id`/`zip_code`.
        lse_id:
          type: string
          example: gen_lse_734
          description: The ID of the Genability [load serving entity](https://developer.genability.com/api-reference/tariff-api/load-serving-entity/)
            prefixed with `gen_lse_`. Must be provided if searching for tariffs by
            Genability `lse_id`/`zip_code`.
        applicability_answers:
          type: array
          description: Site or customer-specific answers to applicability questions
            to determine tariff eligibility.
          items:
            $ref: '#/components/schemas/TariffApplicabilityAnswerSchema'
          example:
          - question_id: EV
            value: true
            data_type: YES_NO
          - question_id: SOLAR
            value: true
            data_type: YES_NO
          - question_id: ELECTRIC_HEAT
            value: false
            data_type: YES_NO
          - question_id: ELECTRIC_WATER
            value: false
            data_type: YES_NO
          - question_id: HEAT_PUMP
            value: false
            data_type: YES_NO
          - question_id: SENIOR_CITIZEN
            value: false
            data_type: YES_NO
          - question_id: LOW_INCOME
            value: false
            data_type: YES_NO
          - question_id: CA_CARE_CUSTOMER
            value: false
            data_type: YES_NO
          - question_id: CA_FERA
            value: false
            data_type: YES_NO
      additionalProperties: false
    OptimizedTariffRecommendationsResponse:
      required:
      - country
      - lse_id
      - zip_code
      - recommendations
      properties:
        country:
          type: string
          description: The country used for determining tariff applicability
          example: US
        lse_id:
          type: string
          description: The Genability 'lseId' unique identifier for this load serving
            entity. See [Genability documentation](https://developer.genability.com/api-reference/tariff-api/load-serving-entity/)
            for details.
          example: gen_lse_734
        zip_code:
          type: string
          description: The zip code used for determining tariff applicability
          example: '94706'
        recommendations:
          type: array
          description: List of tariffs that best fit the submitted applicability question
            answers. Used to define Tariff-Scenarios for the Calculate Tariff-Scenario
            Cost endpoint
          items:
