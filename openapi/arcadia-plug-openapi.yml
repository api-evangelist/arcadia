      tags:
      - Bundle Webhook Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtilityRemittancePendingRemovalWebhookEvent'
  utilityRemittanceRemoved:
    post:
      summary: Utility Remittance Removed
      description: Webhook posted when a Utility Account is removed from utility remittance.
      operationId: utilityRemittanceRemoved
      tags:
