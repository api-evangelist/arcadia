        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtilityRemittanceItemRemittedWebhookEvent'
  utilityRemittanceItemScheduled:
    post:
      summary: Utility Remittance Item Scheduled
      description: Webhook Event posted when a Utility Remittance Item has been scheduled
      operationId: utilityRemittanceItemScheduled
      tags:
      - Bundle Webhook Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtilityRemittanceItemScheduledWebhookEvent'
  test:
    post:
      summary: Test
      description: Webhook posted when requested via the [test webhook endpoint](#operation/requestWebookTestEvent)
      operationId: test
      tags:
      - Webhook Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestWebhookEvent'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    arcVersionInHeaderParam:
      name: Arcadia-Version
      in: header
      example: '2022-10-13'
      description: The Arcadia-Version for the request
      required: true
      schema:
        type: string
        default: '2022-10-13'
    clientUserIdQueryParam:
      in: query
      name: client_user_id
      required: false
      description: A client_user_id to filter the list of returned items by.
      schema:
        type: string
    paginationLimitParam:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        default: 10
    paginationUpdatedAfterParam:
      in: query
      name: updated_after
      required: false
      description: ISO8601 datetime, used to traverse paginated responses. Use of
        this parameter is mutually exclusive with `updated_before`.
      schema:
        type: string
        format: date-time
    paginationUpdatedBeforeParam:
      in: query
      name: updated_before
      required: false
      description: ISO8601 datetime, used to traverse paginated responses. Use of
        this parameter is mutually exclusive with `updated_after`.
      schema:
        type: string
        format: date-time
    paginationOrderParam:
      in: query
      name: order
      required: false
      description: Used to specify the order in which records should be returned.
        Currently ordered by `updated_at` timestamp.
      schema:
        type: string
        enum:
        - asc
        - desc
        default: desc
    utilityAccountIdInPathParam:
      name: utility_account_id
      in: path
      required: true
      schema:
        type: integer
    clientUserIdInPathParam:
      name: client_user_id
      in: path
      required: true
      schema:
        type: string
    utilityCredentialIdInPathParam:
      name: utility_credential_id
      in: path
      required: true
      schema:
        type: integer
    utilityAccountIdQueryParam:
      in: query
      name: utility_account_id
      required: false
      description: A utility account id to filter the list of returned items by.
      schema:
        type: integer
    serviceTypesQueryParam:
      in: query
      name: service_types
      required: false
      description: A list of service types to filter the list of returns items by.
      schema:
        type: array
        items:
          type: string
          enum:
          - electric
          - gas
          - water
    utilityMeterIdInPathParam:
      name: utility_meter_id
      in: path
      required: true
      schema:
        type: integer
    deprecatedClientUserIdQueryParam:
      in: query
      name: client_user_id
      required: false
      deprecated: true
      description: A client_user_id to filter the list of returned items by. This
        field is deprecated, prefer to use `utility_account_id` instead.
      schema:
        type: string
    utilityStatementIdInPathParam:
      name: utility_statement_id
      in: path
      required: true
      schema:
        type: integer
    intervalDataUtilityAccountIdQueryParam:
      in: query
      name: utility_account_id
      required: false
      description: ID of the utility account to pull interval data from. You must
        provide this parameter or `utility_meter_id`, but not both.
      schema:
        type: integer
    intervalDataUtilityMeterIdQueryParam:
      in: query
      name: utility_meter_id
      required: false
      description: ID of the utility meter to pull interval data from. You must provide
        this parameter or `utility_account_id`, but not both.
      schema:
        type: integer
    startTimeQueryParam:
      in: query
      name: start_time
      required: false
      description: Retrieve interval data starting from and including this timestamp.
        If not provided, this will default to a year before the end timestamp.
      schema:
        type: string
        format: date-time
        example: '2020-03-18T22:00:00-07:00'
    endTimeQueryParam:
      in: query
      name: end_time
      required: false
      description: Retrieve interval data up to and including this timestamp. Defaults
        to the most recently available interval data's timestamp.
      schema:
        type: string
        format: date-time
        example: '2021-03-18T22:00:00-07:00'
    utilityStatementIdQueryParam:
      in: query
      name: utility_statement_id
      required: false
      description: Retrieve interval data from the service period of a specific utility
        statement. Cannot be used with start_time or end_time parameters.
      schema:
        type: integer
    utilityRemittanceItemIdInPathParam:
      name: utility_remittance_item_id
      in: path
      required: true
      schema:
        type: string
    webhookEndpointIdInPathParam:
      name: webhook_endpoint_id
      in: path
      required: true
      schema:
        type: string
        example: 3847dd41-8c90-499a-ac6e-10a027dd231f
    webhookEventIdInPathParam:
      name: webhook_event_id
      in: path
      required: true
      schema:
        type: string
        example: ff95f020-8ef9-409d-bff6-8489e880359c
  headers:
    ArcVersion:
      description: The Arcadia-Version for the response
      schema:
        type: string
      example: '2022-10-13'
      required: true
    RateLimitLimit:
      description: The number of requests that can be made to the API in the RateLimit
        Period
      schema:
        type: integer
      example: 200
      required: true
    RateLimitPeriod:
      description: The number of seconds your application has to perform the number
        of requests specified by RateLimit Limit
      schema:
        type: integer
      example: 10
      required: true
    RateLimitReset:
      description: The time in which you can retry a request. Given in epoch time.
      schema:
        type: integer
      example: 1690895650
      required: true
  schemas:
    AccessTokenResponse:
      required:
      - access_token
      - expires_in
      - scope
      - token_type
      - created_at
      properties:
        access_token:
          type: string
          description: The access token to be used for subsequent requests.
          example: 6-3MbUgRHRV-nNDcgsLpDWQ4hYsZToWZgpf-mfM7ICo
        expires_in:
          type: integer
          description: The number of seconds until the token expires.
          example: 7200
        token_type:
          type: string
          description: The type of token. This will always be "Bearer".
          enum:
          - Bearer
          example: Bearer
        scope:
          type: string
          description: The scope of the token.
          enum:
          - write
          - connect_token
          example: write
        created_at:
          type: integer
          description: When the token was created. Provided in Unix timestamp format.
          example: 1611205026
      additionalProperties: false
    AccessTokenUnauthorizedError:
      required:
      - error
      properties:
        error:
          type: string
          enum:
          - The supplied credentials are invalid.
      additionalProperties: false
    ConnectUrlResponse:
      required:
      - connect_url
      properties:
        connect_url:
          type: string
          description: The url to be used for initializing standalone Connect.
          example: https://connect.arcadia.com?token=QYEPoBOJWc4bV_XpIzJdr8BLG4RdK6h68AP672nab4f
      additionalProperties: false
    ConnectTokenUnauthorizedError:
      required:
      - error
      properties:
        error:
          type: string
          enum:
          - Unknown or invalid access token
      additionalProperties: false
    UtilityCredentialNotFoundError:
      required:
      - error
      properties:
        error:
          type: string
          enum:
          - Couldn't find UtilityCredential
      additionalProperties: false
    ConnectTokenUnprocessableEntityError:
      required:
      - error
      properties:
        error:
          type: string
          enum:
          - 'Param is missing or the value is empty: client_user_id or utility_credential_id'
      additionalProperties: false
    ConnectTokenTooManyParametersError:
      required:
      - error
      properties:
        error:
          type: object
          required:
          - description
          - type
          - details
          properties:
            description:
              type: string
              enum:
              - You cannot pass both client_user_id and utility_credential_id. Please
                only pass one
            type:
              type: string
              enum:
              - INVALID_PARAMATERS
            details:
              type: object
              nullable: true
      additionalProperties: false
    ConnectUrlVariantError:
      required:
      - error
      properties:
        error:
          type: object
