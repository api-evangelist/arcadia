              type: 'null'
      additionalProperties: false
    TouSeason:
      title: TouSeason
      type: object
      properties:
        seasonFromDay:
          title: Seasonfromday
          description: Day of the month on which this season begins (1 - 31).
          minimum: 1
          maximum: 31
          type: integer
        seasonToDay:
          title: Seasontoday
          description: Day of the month after which this season ends (1 - 31).
          minimum: 1
          maximum: 31
          type: integer
        seasonFromMonth:
          title: Seasonfrommonth
          description: Month of the year on which this season begins (1 - 12).
          minimum: 1
          maximum: 12
          type: integer
        seasonToMonth:
          title: Seasontomonth
          description: Month of the year after which this season ends (1 - 12). End
            month is included in the season.
          minimum: 1
          maximum: 12
          type: integer
      required:
      - seasonFromMonth
      - seasonToMonth
    TouPeriod:
      title: TouPeriod
      type: object
      properties:
        fromDayOfWeek:
          title: Fromdayofweek
          description: Day of the week on which this period begins (0 - 6, Monday
            - Sunday).
          default: 0
          minimum: 0
          maximum: 6
          type: integer
        toDayOfWeek:
          title: Todayofweek
          description: Day of the week after which this period ends (0 - 6, Monday
            - Sunday). End day is included in the period.
          default: 6
          minimum: 0
          maximum: 6
          type: integer
        fromHour:
          title: Fromhour
          description: Hour of the day on which this period begins (0 - 23).
          exclusiveMaximum: 24
          minimum: 0
          type: integer
        toHour:
          title: Tohour
          description: Hour of the day before which this period ends (0 - 24). End
            hour is not included in the period.
          minimum: 0
          maximum: 24
          type: integer
      required:
      - fromHour
      - toHour
    TimeOfUse:
      title: TimeOfUse
      type: object
      properties:
        season:
          title: Season
          description: Season to which this TOU schedule applies.
          allOf:
          - $ref: '#/components/schemas/TouSeason'
        touPeriods:
          title: Touperiods
          description: Set of TOU periods defining the schedule.
          type: array
          items:
            $ref: '#/components/schemas/TouPeriod'
      required:
      - touPeriods
    FixedSchedule:
      title: FixedSchedule
      type: object
      properties:
        chargeTous:
          title: Chargetous
          description: TOU schedule for charging the storage system.
          type: array
          items:
            $ref: '#/components/schemas/TimeOfUse'
        dischargeTous:
          title: Dischargetous
          description: TOU schedule for discharging the storage system.
          type: array
          items:
            $ref: '#/components/schemas/TimeOfUse'
        timezone:
          title: Timezone
          description: Timezone in which the schedule is defined. Defaults to tariff
            timezone.
          type: string
      required:
      - chargeTous
      - dischargeTous
    DispatchStrategy:
      title: DispatchStrategy
      type: object
      properties:
        optimize:
          title: Optimize
          description: If `true`, find the optimal dispatch schedule for the given
            tariff, solar, and consumption curves, assuming perfect forecasts.
          type: boolean
        chargeOnSurplus:
          title: Chargeonsurplus
          description: If `true`, charge whenever solar production exceeds consumption
            and discharge to meet consumption otherwise.
          type: boolean
        fixedSchedule:
          title: Fixedschedule
          description: If specified, use a fixed schedule to control battery dispatch,
            charging as much as possible during `charge_tous` and discharging as much
            as possible during `discharge_tous`. Times of use (TOUs) should be specified
            using [Genability format](https://developer.genability.com/api-reference/tariff-api/time-of-use/),
            in either camel or snake case.
          allOf:
          - $ref: '#/components/schemas/FixedSchedule'
    StorageOptimizationSchedulesRequestParams:
      type: object
      properties:
        main_tariff_id:
          description: The Genability 'masterTariffId' unique identifier for this
            tariff, prefixed with `gen_mtid_`. See [Genability documentation](https://developer.genability.com/api-reference/tariff-api/tariff/)
            for details.
          example: gen_mtid_3424821
          type: string
        tariff_property_inputs:
          description: Genability `propertyInputs` applicable to the specified tariff
            that may affect the cost structure being optimized against. See [Genability
            documentation](https://developer.genability.com/api-reference/calculation-api/cost-calculation)
            for details on how to set these inputs for specific tariffs. Use Genability-defined
            input format.
          type: array
          items:
            type: object
            required:
            - keyName
            - dataValue
            properties:
              keyName:
                type: string
                example: accPlusAdderCustomerType
              dataValue:
                type: boolean
                example: nonLowIncome
        from_date_time:
          description: Start time of the consumption and solar curves. Must be the
            start of an hour (i.e. `:00:00`).
          example: '2021-03-18T00:00:00-07:00'
          type: string
          format: date-time
        consumption_curve_kwh_ac:
          description: Timeseries representing how much AC consumption needs to be
            met at each timestep (kWh AC).
          example:
          - 0.8
          - 1
          - 1.2
          - 1
          minItems: 1
          type: array
          items:
            type: number
            minimum: 0
        solar_generation_curve_kwh_dc:
          description: Timeseries representing how much DC solar production occurs
            at each timestep (kWh DC). If absent, assumed to be 0. If present, must
            have the same length as `consumption_curve_kwh_ac`. Note that DC to AC
            conversion is specified with `solar_dc_to_ac_efficiency`.
          example:
          - 0.5
          - 2.4
          - 1.3
          - 0.4
          type: array
          items:
            type: number
            minimum: 0
        dispatch_strategy:
          description: 'Parameters controlling how to compute dispatch curves. Defaults
            to `{ ''optimize'': true }`, which uses constrained optimization to determine
            a best-case schedule. Also supports `charge_on_surplus` and `fixed_schedule`
            strategies.'
          allOf:
          - $ref: '#/components/schemas/DispatchStrategy'
        solar_dc_to_ac_efficiency:
          description: How efficiently the solar inverter converts outgoing DC power
            to AC (`0.0` - `1.0`).
          default: 0.96
          minimum: 0
          maximum: 1
          type: number
          example: 0.96
        allow_grid_to_battery:
          description: Allow the battery to be charged from the grid (`true`/`false`,
            defaults to `true`). DC-coupled batteries only chargable via solar should
            set this to `false`.
          default: true
          type: boolean
          example: true
        allow_solar_to_battery:
          description: Allow the battery to be charged from solar (`true`/`false`,
            defaults to `true`). AC-coupled batteries may want to set this to `false`
            if indirect AC charging from converted solar is not possible.
          default: true
          type: boolean
          example: true
        allow_solar_to_grid:
          description: Allow excess solar to be sold back to the grid (`true`/`false`,
            defaults to `true`). Solar tied exclusively to the battery and/or the
            site should set this to `false`, which may cause curtailment in the result.
          default: true
          type: boolean
          example: true
        allow_battery_to_grid:
          description: Allow battery to export energy to the grid (`true`/`false`,
            defaults to `true`). Batteries configured exclusively for self-consumption
            should set this to `false`.
          default: true
          type: boolean
          example: true
        battery_dc_coupled:
          description: Whether the battery is DC coupled (`true`/`false`). If `false`,
            solar power must be converted from DC to AC and then back to DC before
            it can be stored.
          default: true
          type: boolean
          example: true
        battery_ac_to_dc_efficiency:
          description: How efficiently the battery inverter converts incoming AC power
            to DC (`0.0` - `1.0`).
          default: 0.96
          minimum: 0
          maximum: 1
          type: number
          example: 0.96
        battery_dc_to_ac_efficiency:
          description: How efficiently the battery inverter converts outgoing DC power
            to AC (`0.0` - `1.0`)
          default: 0.96
          minimum: 0
          maximum: 1
          type: number
          example: 0.96
        battery_input_efficiency:
          description: Coulombic efficiency of the battery, i.e. ratio of input kWh
            for a full charge to output kWh for a full discharge (`0.0` - `1.0`).
          default: 0.975
          minimum: 0
          maximum: 1
          type: number
          example: 0.975
        battery_nameplate_power:
          description: The maximum amount of power that can instantaneously flow into
            or out of the battery (kW DC).
          default: 3
          exclusiveMinimum: 0
          type: number
          example: 3
        battery_nameplate_capacity:
          description: Maximum charge that the battery can hold (kWh DC).
          default: 6
          exclusiveMinimum: 0
          type: number
          example: 6
        battery_min_soc:
          description: Minimum state of charge of the battery (`0.0` - `1.0`).
          default: 0.1
          minimum: 0
          maximum: 1
          type: number
          example: 0.1
        battery_max_soc:
          description: Maximum state of charge of the battery (`0.0` - `1.0`).
          default: 1
          minimum: 0
          maximum: 1
          type: number
          example: 1
        battery_initial_soc:
          description: Initial state of charge of the battery (`0.0` - `1.0`).
          default: 0.5
          minimum: 0
          maximum: 1
          type: number
          example: 0.5
        battery_degradation_cost_per_discharge_kwh:
          description: Optionally impose a cost on total discharge from the battery
            as a simplified degradation model ($/kWh).
          default: 0
          minimum: 0
          type: number
          example: 0
        export_limit_kwh_ac:
          description: Maximum energy that can be exported to the grid at any given
            timestep (kWh AC). Leave unspecified for unlimited exports, or set to
            `0` to forbid them.
          minimum: 0
          type: number
      required:
      - main_tariff_id
      - from_date_time
      - consumption_curve_kwh_ac
      additionalProperties: false
      definitions:
        TouSeason:
          title: TouSeason
          type: object
          properties:
            seasonFromDay:
              title: Seasonfromday
              description: Day of the month on which this season begins (1 - 31).
              minimum: 1
              maximum: 31
              type: integer
            seasonToDay:
              title: Seasontoday
              description: Day of the month after which this season ends (1 - 31).
              minimum: 1
              maximum: 31
              type: integer
            seasonFromMonth:
              title: Seasonfrommonth
              description: Month of the year on which this season begins (1 - 12).
              minimum: 1
              maximum: 12
              type: integer
            seasonToMonth:
              title: Seasontomonth
              description: Month of the year after which this season ends (1 - 12).
                End month is included in the season.
              minimum: 1
              maximum: 12
              type: integer
          required:
          - seasonFromMonth
          - seasonToMonth
        TouPeriod:
          title: TouPeriod
          type: object
          properties:
            fromDayOfWeek:
              title: Fromdayofweek
              description: Day of the week on which this period begins (0 - 6, Monday
                - Sunday).
              default: 0
              minimum: 0
              maximum: 6
              type: integer
            toDayOfWeek:
              title: Todayofweek
              description: Day of the week after which this period ends (0 - 6, Monday
                - Sunday). End day is included in the period.
              default: 6
              minimum: 0
              maximum: 6
              type: integer
            fromHour:
              title: Fromhour
              description: Hour of the day on which this period begins (0 - 23).
              exclusiveMaximum: 24
              minimum: 0
              type: integer
            toHour:
              title: Tohour
              description: Hour of the day before which this period ends (0 - 24).
                End hour is not included in the period.
              minimum: 0
              maximum: 24
              type: integer
          required:
          - fromHour
          - toHour
        TimeOfUse:
          title: TimeOfUse
          type: object
          properties:
            season:
              title: Season
              description: Season to which this TOU schedule applies.
              allOf:
              - $ref: '#/components/schemas/TouSeason'
            touPeriods:
              title: Touperiods
              description: Set of TOU periods defining the schedule.
              type: array
              items:
                $ref: '#/components/schemas/TouPeriod'
          required:
          - touPeriods
        FixedSchedule:
          title: FixedSchedule
          type: object
          properties:
            chargeTous:
              title: Chargetous
              description: TOU schedule for charging the storage system.
              type: array
              items:
                $ref: '#/components/schemas/TimeOfUse'
            dischargeTous:
              title: Dischargetous
              description: TOU schedule for discharging the storage system.
              type: array
              items:
                $ref: '#/components/schemas/TimeOfUse'
            timezone:
              title: Timezone
              description: Timezone in which the schedule is defined. Defaults to
                tariff timezone.
              type: string
          required:
          - chargeTous
          - dischargeTous
        DispatchStrategy:
          title: DispatchStrategy
          type: object
          properties:
            optimize:
              title: Optimize
              description: If `true`, find the optimal dispatch schedule for the given
                tariff, solar, and consumption curves, assuming perfect forecasts.
              type: boolean
            chargeOnSurplus:
              title: Chargeonsurplus
              description: If `true`, charge whenever solar production exceeds consumption
                and discharge to meet consumption otherwise.
              type: boolean
            fixedSchedule:
              title: Fixedschedule
              description: If specified, use a fixed schedule to control battery dispatch,
                charging as much as possible during `charge_tous` and discharging
                as much as possible during `discharge_tous`. Times of use (TOUs) should
                be specified using [Genability format](https://developer.genability.com/api-reference/tariff-api/time-of-use/),
                in either camel or snake case.
              allOf:
              - $ref: '#/components/schemas/FixedSchedule'
    StorageOptimizationSchedulesResponse:
      type: object
      properties:
        from_date_time:
          description: Start time corresponding to the beginning of the hour when
            the consumption and solar curves start. Echoed back from request parameters.
          example: '2021-03-18T00:00:00-07:00'
          type: string
          format: date-time
        grid_to_site_kwh_ac:
          description: Amount of electricity flowing to site load from the grid (kWh
            AC).
          example:
          - 1.3
          - 1.1
          - 0
          - 0
          type: array
          items:
            type: number
            minimum: 0
        grid_to_battery_kwh_ac:
          description: Amount of electricity flowing to the battery from the grid,
            before conversion with `battery_ac_to_dc_efficiency` (kWh AC).
          example:
          - 1.56
          - 0
          - 0
          - 0
          type: array
          items:
            type: number
            minimum: 0
        solar_to_battery_kwh_dc:
          description: Amount of electricity flowing to the battery from PV solar
            generation, either without any conversion if `battery_dc_coupled` or after
            double-conversion with `solar_dc_to_ac_efficiency` * `battery_ac_to_dc_efficiency`
            if not (kWh DC).
          example:
          - 0
          - 1.5
          - 0
          - 0
          type: array
          items:
            type: number
            minimum: 0
        solar_to_site_kwh_ac:
          description: Amount of electricity flowing to site load from PV solar generation,
            after conversion with `solar_dc_to_ac_efficiency` (kWh AC).
          example:
          - 0
          - 0.1
          - 1.3
          - 1.5
          type: array
          items:
            type: number
            minimum: 0
        solar_to_grid_kwh_ac:
          description: Amount of electricity flowing to the grid from PV solar generation,
            after conversion with `solar_dc_to_ac_efficiency` (kWh AC).
          example:
          - 0
          - 0
          - 0.4
          - 1.4
          type: array
          items:
            type: number
            minimum: 0
        solar_curtailed_kwh_dc:
          description: Amount of electricity from solar that goes unused (kWh DC).
          example:
          - 0
          - 0
          - 0
          - 0
          type: array
          items:
            type: number
            minimum: 0
        battery_to_site_kwh_ac:
          description: Amount of electricity flowing to site load from the battery,
            after conversion with `battery_dc_to_ac_efficiency` (kWh AC).
          example:
          - 0
          - 0
          - 0.1
          - 0.2
          type: array
          items:
            type: number
            minimum: 0
        battery_to_grid_kwh_ac:
          description: Amount of electricity flowing to the grid from battery, after
            conversion with `battery_dc_to_ac_efficiency` (kWh AC).
          example:
          - 0
          - 0
          - 0.1
          - 0.2
          type: array
          items:
            type: number
            minimum: 0
        net_load_kwh_ac:
          description: Amount of electricity flowing from the grid if positive or
            to the grid if negative (kWh AC). Equals `grid_to_site_kwh_ac` + `grid_to_battery_kwh_ac`
            - `battery_to_grid_kwh_ac` - `solar_to_grid_kwh_ac`.
          example:
          - 1.86
          - 1.1
          - -0.5
          - -1.6
          type: array
          items:
            type: number
        battery_soc:
          description: Hourly battery state of charge (`0.0` - `1.0`, though in practice,
            all values will be between `battery_min_soc` and `battery_max_soc`). Multiply
            by `battery_nameplate_capacity` to get a timeseries of kWh DC stored.
          example:
          - 0.75
          - 1
          - 0.8
          - 0.4
          type: array
          items:
            type: number
            minimum: 0
            maximum: 1
      required:
      - from_date_time
      - grid_to_site_kwh_ac
      - grid_to_battery_kwh_ac
      - solar_to_battery_kwh_dc
      - solar_to_site_kwh_ac
      - solar_to_grid_kwh_ac
      - solar_curtailed_kwh_dc
      - battery_to_site_kwh_ac
      - battery_to_grid_kwh_ac
      - battery_soc
      additionalProperties: false
