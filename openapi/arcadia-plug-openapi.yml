    BundleUtilityRemittanceItemCreateRequestBodyParams:
      properties:
        scheduled_at:
          description: You can specify a date for remittance using `scheduled_at`.
            Note that `scheduled_at` must be a date in the future. If the date you
            specify falls on a weekend or a banking holiday, remittance will be scheduled
            for the next business day. If `scheduled_at` is omitted, remittance will
            be scheduled for the next business day.
          type: string
          format: date
          example: '2021-07-28'
        amount_cents:
          description: You can specify how much to remit for this Utility Statement
            using `amount_cents`. In most cases, this should correspond to the `utility_charge`
            on a Utility Statement.  If `amount_cents` is omitted, the Utility Remittance
            Item will be created using the `utility_charge` on the specified Utility
            Statement. At this time, `amount_cents` cannot exceed 3000000 cents ($30,000).
            Note that overpaying or underpaying the amount on a Utility Statement
            comes with risk. This field should be used with caution.
          type: integer
          example: '8000'
