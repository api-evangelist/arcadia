          type: boolean
          example: false
          description: 'Indicates if Arcadia is in the process of verifying a utility
            credential or loading associated utility accounts. The combination of
            `verification_status: verified` and `account_load_in_progress: false`
            will indicate that utility accounts are available in the API. Alternatively,
            the `utility_accounts_discovered` webhook will alert you when utility
            accounts are available in the API.'
