      additionalProperties: false
    TariffScenarioDeviceSolarParams:
      required:
      - device
      - solar_system_kw
      properties:
        device:
          type: string
          description: Identifies this device as a rooftop solar system
          example: SOLAR
          enum:
          - SOLAR
        solar_system_kw:
          type: number
          description: Size of solar system in kW
          example: 5
      additionalProperties: false
    EvChargePlan:
      description: Specifies a time window where the EV is at home and available for
        charging.
      required:
      - start_day_of_week
      - start_time
      - end_day_of_week
      - end_time
      - expected_consumption_kwh
      properties:
        start_day_of_week:
          type: integer
          description: Day of the week the available charging block begins. ISO format
            -- 1 is Monday, 7 is Sunday.
          example: 1
        start_time:
          type: string
          description: Time when the EV is available to begin charging. For example,
            when the driver comes home in the evening.
          example: '15:00:00'
        end_day_of_week:
          type: integer
          description: Day of the week the available charging block ends. ISO format
            -- 1 is Monday, 7 is Sunday.
          example: 2
        end_time:
          type: string
          description: Time when the EV is no longer available for charging. For example,
            when the driver leaves for their morning commute.
          example: 06:00:00
        expected_consumption_kwh:
          type: number
          description: Expected kwh consumption until the next EvChargePlan residential
            charging event.
          example: 15
      additionalProperties: false
    TariffScenarioDeviceEvChargingParams:
      description: Parameters for charging level and EV operation schedule
      required:
      - device
      - charging_availability
      - charging_power_kw
      - operation_schedule
      properties:
        device:
          type: string
          description: A value of `EV_CHARGING` indicates a future EV purchase.
          example: EV_CHARGING
          enum:
          - EV_CHARGING
        charging_availability:
          type: array
          description: Schedule of when the car is at home and able to be charged.
            `BASIC` charging will simulate a charging schedule assuming charging starts
            at the specified window start times (for example, at 18:00 when the driver
            comes home). `SMART` charging will simulate a charging schedule using
            our Calculate Smart Charging Schedule endpoint logic to charge during
            the cheapest hours on this tariff in the provided windows.
          items:
            $ref: '#/components/schemas/EvChargePlan'
        charging_power_kw:
          type: number
          example: 1.8
          description: This helps to determine the EVSE (electric vehicle supply equipment)
            level. 0.0 indicates no charging at home. 1.8kW or 2.4kW chargers are
            typical power levels for wall outlets (Level 1). 7.2kW or 9.6kW are typical
            charging powers for a Level 2 charger.
        operation_schedule:
          type: string
          enum:
          - BASIC
          - SMART
          example: SMART
          description: An operation schedule of `BASIC` charging will simulate a charging
            schedule assuming charging starts at the specified window start times
            (for example, at 18:00 when the driver comes home). `SMART` charging will
            simulate a charging schedule using our Calculate Smart Charging Schedule
            endpoint logic to charge during the cheapest hours on this tariff in the
            provided windows.
      additionalProperties: false
    TariffScenarioDeviceRemovedEvChargingParams:
      description: Parameters for charging level and EV operation schedule
      properties:
        device:
          type: string
          description: The `REMOVED_EV_CHARGING` parameter is used to remove (disaggregate)
            simulated existing EV load, eg to simulate effects of adding smart charging
            by removing effects of basic charging.
          example: REMOVED_EV_CHARGING
          enum:
          - REMOVED_EV_CHARGING
        charging_availability:
          type: array
          description: Schedule of when the car is at home and able to be charged.
            `BASIC` charging will simulate a charging schedule assuming charging starts
            at the specified window start times (for example, at 18:00 when the driver
            comes home). `SMART` charging will simulate a charging schedule using
            our Calculate Smart Charging Schedule endpoint logic to charge during
            the cheapest hours on this tariff in the provided windows.
          items:
            $ref: '#/components/schemas/EvChargePlan'
        charging_power_kw:
          type: number
          example: 1.8
          description: This helps to determine the EVSE (electric vehicle supply equipment)
            level. 0.0 indicates no charging at home. 1.8kW or 2.4kW chargers are
            typical power levels for wall outlets (Level 1). 7.2kW or 9.6kW are typical
            charging powers for a Level 2 charger.
        operation_schedule:
          type: string
          enum:
          - BASIC
          - SMART
          example: SMART
          description: An operation schedule of `BASIC` charging will simulate a charging
            schedule assuming charging starts at the specified window start times
            (for example, at 18:00 when the driver comes home). `SMART` charging will
            simulate a charging schedule using our Calculate Smart Charging Schedule
            endpoint logic to charge during the cheapest hours on this tariff in the
            provided windows.
      additionalProperties: false
    TariffScenarioCostRequestParams:
      required:
      - baseline_load
      - device_loads
      properties:
        utility_account_id:
          description: (Beta - due to limited coverage) The unique ID of the utility
            account that this calculation is being run against. Optional if calculating
            costs by Genability `main_tariff_id`/`zip_code`.
          type: integer
        main_tariff_id:
          type: string
          description: The Genability 'masterTariffId' unique identifier for this
            tariff. See [Genability documentation](https://developer.genability.com/api-reference/tariff-api/tariff/)
            for details. Must be provided if calculating costs by Genability `main_tariff_id`/`zip_code`.
          example: gen_mtid_3331108
        zip_code:
          type: string
          description: The zip code of the scenario. Must be provided if calculating
            costs by Genability `main_tariff_id`/`zip_code`.
          example: '94105'
        applicability_answers:
          type: array
          description: Answers to tariff applicability questions
          items:
            $ref: '#/components/schemas/TariffApplicabilityAnswerSchema'
          example:
          - question_id: EV
            value: true
            data_type: YES_NO
          - question_id: SOLAR
            value: true
            data_type: YES_NO
          - question_id: ELECTRIC_HEAT
            value: false
            data_type: YES_NO
          - question_id: ELECTRIC_WATER
            value: false
            data_type: YES_NO
          - question_id: HEAT_PUMP
            value: false
            data_type: YES_NO
          - question_id: SENIOR_CITIZEN
            value: false
            data_type: YES_NO
          - question_id: LOW_INCOME
            value: false
            data_type: YES_NO
          - question_id: CA_CARE_CUSTOMER
            value: false
            data_type: YES_NO
          - question_id: CA_FERA
            value: false
            data_type: YES_NO
        baseline_load:
          type: string
          description: A `TYPICALS` `baseline_load` uses the typical hourly energy
            usage for the end-user's zip code.
          default: TYPICALS
          enum:
          - TYPICALS
        device_loads:
          type: array
          description: List of device simulations to add additional synthetic load
            curves on top of the `baseline_load`
          items:
            anyOf:
            - $ref: '#/components/schemas/TariffScenarioDeviceSolarParams'
            - $ref: '#/components/schemas/TariffScenarioDeviceEvChargingParams'
            - $ref: '#/components/schemas/TariffScenarioDeviceRemovedEvChargingParams'
          example:
          - device: EV_CHARGING
            charging_power_kw: 7.2
            operation_schedule: SMART
            charging_availability:
            - start_day_of_week: 1
              start_time: '18:00:00'
              end_day_of_week: 2
              end_time: 09:00:00
              expected_consumption_kwh: 10.4
            - start_day_of_week: 2
              start_time: '18:00:00'
              end_day_of_week: 3
              end_time: 09:00:00
              expected_consumption_kwh: 10.4
            - start_day_of_week: 3
              start_time: '18:00:00'
              end_day_of_week: 4
              end_time: 09:00:00
              expected_consumption_kwh: 10.4
            - start_day_of_week: 4
              start_time: '18:00:00'
              end_day_of_week: 5
              end_time: 09:00:00
              expected_consumption_kwh: 10.4
            - start_day_of_week: 5
              start_time: '18:00:00'
              end_day_of_week: 6
              end_time: '10:00:00'
              expected_consumption_kwh: 10.4
            - start_day_of_week: 6
              start_time: '16:00:00'
              end_day_of_week: 7
              end_time: '10:00:00'
              expected_consumption_kwh: 5
            - start_day_of_week: 7
              start_time: '16:00:00'
              end_day_of_week: 1
              end_time: 09:00:00
              expected_consumption_kwh: 5
          - device: SOLAR
            solar_system_kw: 5
      additionalProperties: false
    TariffScenarioCostResponse:
      description: Parameters for a rooftop solar system
      properties:
        cost:
          type: number
          description: Costs from multiple Tariff-Scenarios can be compared to find
            the optimal combination of tariff and device-scenarios. A baseline Tariff-Scenario
            cost can be calculated to present potential savings of each what-if Tariff-Scenario.
            Plug endpoints can be used to further compare to actual utility costs.
          example: 150
        start_date:
          type: string
          format: date
          description: The start date of the calculated simulation. If using `baseline_load=TYPICALS`,
            this will be one year in the past.
          example: '2021-02-03'
        end_date:
          type: string
          format: date
          description: The end date of the calculated simulation. If using `baseline_load=TYPICALS`,
            this will be the current time.
          example: '2022-02-03'
      additionalProperties: false
    TariffScenarioCostRequestTariffIdentificationParamError:
