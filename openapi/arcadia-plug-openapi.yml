      properties:
        utility_account_id:
          description: (Beta - due to limited coverage) The unique ID of the utility
            account that this calculation is being run against. Either a `utility_account_id`
            or `main_tariff_id` is required for a valid request.
          type: integer
        main_tariff_id:
          type: string
          description: The Genability 'masterTariffId' unique identifier for this
            tariff. See [Genability documentation](https://developer.genability.com/api-reference/tariff-api/tariff/)
            for details. Either a `utility_account_id` or `main_tariff_id` is required
            for a valid request.
          example: gen_mtid_3331108
        start_time:
          description: 'ISO8601 timestamp of when the charge begins. Note that the
            timestamp will be normalized down to the start of latest charge block
            resolution.

            For example, if the `charge_block_resolution` is `1h` and the charging
            session starts at `2021-06-24T14:59:59Z`, the `start_time` used to calculate
