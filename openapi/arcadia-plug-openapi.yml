      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUtilityStatementAvailableWebhookEvent'
  utilityRemittancePendingEnrollment:
    post:
      summary: Utility Remittance Pending Enrollment
