            `charge_block_resolution` is `15m`, the `start_time` would be normalized
            to `2021-06-24T14:45:00Z`.

            This normalization technique eliminates ambiguity around charging that
            occurs across time-of-use on/mid/off-peak window boundaries.

            '
          type: string
          format: date-time
          example: '2021-03-18T22:00:00-07:00'
