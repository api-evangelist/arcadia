          description: The load curve being priced. An array of charge blocks with
            each block representing the kWh of power consumed or to be consumed in
            that block.
          type: array
          items:
            type: number
          example:
          - 0
          - 0
          - 7.2
          - 0
          - 7.2
          - 2.9
      additionalProperties: false
