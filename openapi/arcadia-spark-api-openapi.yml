          minimum: 1
          maximum: 31
          type: integer
        seasonToDay:
          title: Seasontoday
          description: Day of the month after which this season ends (1 - 31).
          minimum: 1
          maximum: 31
          type: integer
        seasonFromMonth:
          title: Seasonfrommonth
          description: Month of the year on which this season begins (1 - 12).
          minimum: 1
          maximum: 12
          type: integer
        seasonToMonth:
