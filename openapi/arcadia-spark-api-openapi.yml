      - seasonFromMonth
      - seasonToMonth
    DispatchStrategy:
      title: DispatchStrategy
      type: object
      properties:
        optimize:
          title: Optimize
          description: If `true`, find the optimal dispatch schedule for the given tariff, solar, and consumption curves, assuming perfect forecasts.
          type: boolean
        chargeOnSurplus:
          title: Chargeonsurplus
          description: If `true`, charge whenever solar production exceeds consumption and discharge to meet consumption otherwise.
          type: boolean
        fixedSchedule:
          title: Fixedschedule
          description: If specified, use a fixed schedule to control battery dispatch, charging as much as possible during `charge_tous` and discharging as much as possible during `discharge_tous`. Times of use (TOUs) should be specified using [Genability format](https://developer.genability.com/api-reference/tariff-api/time-of-use/), in either camel or snake case.
          allOf:
          - $ref: '#/components/schemas/FixedSchedule'
    TariffScenarioDeviceRemovedEvChargingParams:
      description: Parameters for charging level and EV operation schedule
      properties:
        device:
          type: string
          description: The `REMOVED_EV_CHARGING` parameter is used to remove (disaggregate) simulated existing EV load, eg to simulate effects of adding smart charging by removing effects of basic charging.
          example: REMOVED_EV_CHARGING
          enum:
          - REMOVED_EV_CHARGING
        charging_availability:
          type: array
          description: Schedule of when the car is at home and able to be charged. `BASIC` charging will simulate a charging schedule assuming charging starts at the specified window start times (for example, at 18:00 when the driver comes home). `SMART` charging will simulate a charging schedule using our Calculate Smart Charging Schedule endpoint logic to charge during the cheapest hours on this tariff in the provided windows.
          items:
            $ref: '#/components/schemas/EvChargePlan'
        charging_power_kw:
          type: number
          example: 1.8
          description: This helps to determine the EVSE (electric vehicle supply equipment) level. 0.0 indicates no charging at home. 1.8kW or 2.4kW chargers are typical power levels for wall outlets (Level 1). 7.2kW or 9.6kW are typical charging powers for a Level 2 charger.
        operation_schedule:
          type: string
          enum:
          - BASIC
          - SMART
          example: SMART
          description: An operation schedule of `BASIC` charging will simulate a charging schedule assuming charging starts at the specified window start times (for example, at 18:00 when the driver comes home). `SMART` charging will simulate a charging schedule using our Calculate Smart Charging Schedule endpoint logic to charge during the cheapest hours on this tariff in the provided windows.
      additionalProperties: false
    TariffScenarioDeviceSolarParams:
      required:
      - device
      - solar_system_kw
      properties:
        device:
          type: string
          description: Identifies this device as a rooftop solar system
          example: SOLAR
          enum:
          - SOLAR
        solar_system_kw:
          type: number
          description: Size of solar system in kW
          example: 5
      additionalProperties: false
    StorageOptimizationSchedulesRequestParams:
      type: object
      properties:
        main_tariff_id:
          description: The Genability 'masterTariffId' unique identifier for this tariff, prefixed with `gen_mtid_`. See [Genability documentation](https://developer.genability.com/api-reference/tariff-api/tariff/) for details.
          example: gen_mtid_3424821
          type: string
        tariff_property_inputs:
          description: Genability `propertyInputs` applicable to the specified tariff that may affect the cost structure being optimized against. See [Genability documentation](https://developer.genability.com/api-reference/calculation-api/cost-calculation) for details on how to set these inputs for specific tariffs. Use Genability-defined input format.
          type: array
          items:
            type: object
            required:
            - keyName
            - dataValue
            properties:
              keyName:
                type: string
                example: accPlusAdderCustomerType
              dataValue:
                type: boolean
                example: nonLowIncome
        from_date_time:
          description: Start time of the consumption and solar curves. Must be the start of an hour (i.e. `:00:00`).
          example: '2021-03-18T00:00:00-07:00'
          type: string
          format: date-time
        consumption_curve_kwh_ac:
          description: Timeseries representing how much AC consumption needs to be met at each timestep (kWh AC).
          example:
          - 0.8
          - 1
          - 1.2
          - 1
          minItems: 1
          type: array
          items:
            type: number
            minimum: 0
        solar_generation_curve_kwh_dc:
          description: Timeseries representing how much DC solar production occurs at each timestep (kWh DC). If absent, assumed to be 0. If present, must have the same length as `consumption_curve_kwh_ac`. Note that DC to AC conversion is specified with `solar_dc_to_ac_efficiency`.
          example:
          - 0.5
          - 2.4
          - 1.3
          - 0.4
          type: array
          items:
            type: number
            minimum: 0
        dispatch_strategy:
          description: 'Parameters controlling how to compute dispatch curves. Defaults to `{ ''optimize'': true }`, which uses constrained optimization to determine a best-case schedule. Also supports `charge_on_surplus` and `fixed_schedule` strategies.'
          allOf:
          - $ref: '#/components/schemas/DispatchStrategy'
        solar_dc_to_ac_efficiency:
          description: How efficiently the solar inverter converts outgoing DC power to AC (`0.0` - `1.0`).
          default: 0.96
          minimum: 0
          maximum: 1
          type: number
          example: 0.96
        allow_grid_to_battery:
          description: Allow the battery to be charged from the grid (`true`/`false`, defaults to `true`). DC-coupled batteries only chargable via solar should set this to `false`.
          default: true
          type: boolean
          example: true
        allow_solar_to_battery:
          description: Allow the battery to be charged from solar (`true`/`false`, defaults to `true`). AC-coupled batteries may want to set this to `false` if indirect AC charging from converted solar is not possible.
          default: true
          type: boolean
          example: true
        allow_solar_to_grid:
          description: Allow excess solar to be sold back to the grid (`true`/`false`, defaults to `true`). Solar tied exclusively to the battery and/or the site should set this to `false`, which may cause curtailment in the result.
          default: true
          type: boolean
          example: true
        allow_battery_to_grid:
          description: Allow battery to export energy to the grid (`true`/`false`, defaults to `true`). Batteries configured exclusively for self-consumption should set this to `false`.
          default: true
          type: boolean
          example: true
        battery_dc_coupled:
          description: Whether the battery is DC coupled (`true`/`false`). If `false`, solar power must be converted from DC to AC and then back to DC before it can be stored.
          default: true
          type: boolean
          example: true
        battery_ac_to_dc_efficiency:
          description: How efficiently the battery inverter converts incoming AC power to DC (`0.0` - `1.0`).
          default: 0.96
          minimum: 0
          maximum: 1
          type: number
          example: 0.96
        battery_dc_to_ac_efficiency:
          description: How efficiently the battery inverter converts outgoing DC power to AC (`0.0` - `1.0`)
          default: 0.96
          minimum: 0
          maximum: 1
          type: number
          example: 0.96
        battery_input_efficiency:
          description: Coulombic efficiency of the battery, i.e. ratio of input kWh for a full charge to output kWh for a full discharge (`0.0` - `1.0`).
          default: 0.975
          minimum: 0
          maximum: 1
          type: number
          example: 0.975
        battery_nameplate_power:
          description: The maximum amount of power that can instantaneously flow into or out of the battery (kW DC).
          default: 3
          exclusiveMinimum: 0
          type: number
          example: 3
        battery_nameplate_capacity:
          description: Maximum charge that the battery can hold (kWh DC).
          default: 6
          exclusiveMinimum: 0
          type: number
          example: 6
        battery_min_soc:
          description: Minimum state of charge of the battery (`0.0` - `1.0`).
          default: 0.1
          minimum: 0
          maximum: 1
          type: number
          example: 0.1
        battery_max_soc:
          description: Maximum state of charge of the battery (`0.0` - `1.0`).
          default: 1
          minimum: 0
          maximum: 1
          type: number
          example: 1
        battery_initial_soc:
          description: Initial state of charge of the battery (`0.0` - `1.0`).
          default: 0.5
          minimum: 0
          maximum: 1
          type: number
          example: 0.5
        battery_degradation_cost_per_discharge_kwh:
          description: Optionally impose a cost on total discharge from the battery as a simplified degradation model ($/kWh).
          default: 0
          minimum: 0
          type: number
          example: 0
        export_limit_kwh_ac:
          description: Maximum energy that can be exported to the grid at any given timestep (kWh AC). Leave unspecified for unlimited exports, or set to `0` to forbid them.
          minimum: 0
          type: number
      required:
      - main_tariff_id
      - from_date_time
      - consumption_curve_kwh_ac
      additionalProperties: false
      definitions:
        TouSeason:
          title: TouSeason
          type: object
          properties:
            seasonFromDay:
              title: Seasonfromday
              description: Day of the month on which this season begins (1 - 31).
              minimum: 1
              maximum: 31
              type: integer
            seasonToDay:
              title: Seasontoday
              description: Day of the month after which this season ends (1 - 31).
              minimum: 1
              maximum: 31
              type: integer
            seasonFromMonth:
              title: Seasonfrommonth
              description: Month of the year on which this season begins (1 - 12).
              minimum: 1
              maximum: 12
              type: integer
            seasonToMonth:
              title: Seasontomonth
              description: Month of the year after which this season ends (1 - 12). End month is included in the season.
              minimum: 1
              maximum: 12
              type: integer
          required:
          - seasonFromMonth
          - seasonToMonth
        TouPeriod:
          title: TouPeriod
          type: object
          properties:
            fromDayOfWeek:
              title: Fromdayofweek
              description: Day of the week on which this period begins (0 - 6, Monday - Sunday).
              default: 0
              minimum: 0
              maximum: 6
              type: integer
            toDayOfWeek:
              title: Todayofweek
              description: Day of the week after which this period ends (0 - 6, Monday - Sunday). End day is included in the period.
              default: 6
              minimum: 0
              maximum: 6
              type: integer
            fromHour:
              title: Fromhour
              description: Hour of the day on which this period begins (0 - 23).
              exclusiveMaximum: 24
              minimum: 0
              type: integer
            toHour:
              title: Tohour
              description: Hour of the day before which this period ends (0 - 24). End hour is not included in the period.
              minimum: 0
              maximum: 24
              type: integer
          required:
          - fromHour
          - toHour
        TimeOfUse:
          title: TimeOfUse
          type: object
          properties:
            season:
              title: Season
              description: Season to which this TOU schedule applies.
              allOf:
              - $ref: '#/components/schemas/TouSeason'
            touPeriods:
              title: Touperiods
              description: Set of TOU periods defining the schedule.
              type: array
              items:
                $ref: '#/components/schemas/TouPeriod'
          required:
          - touPeriods
        FixedSchedule:
          title: FixedSchedule
          type: object
          properties:
            chargeTous:
              title: Chargetous
              description: TOU schedule for charging the storage system.
              type: array
              items:
                $ref: '#/components/schemas/TimeOfUse'
            dischargeTous:
              title: Dischargetous
              description: TOU schedule for discharging the storage system.
              type: array
              items:
                $ref: '#/components/schemas/TimeOfUse'
            timezone:
              title: Timezone
              description: Timezone in which the schedule is defined. Defaults to tariff timezone.
              type: string
          required:
          - chargeTous
          - dischargeTous
        DispatchStrategy:
          title: DispatchStrategy
          type: object
          properties:
            optimize:
              title: Optimize
              description: If `true`, find the optimal dispatch schedule for the given tariff, solar, and consumption curves, assuming perfect forecasts.
              type: boolean
            chargeOnSurplus:
              title: Chargeonsurplus
              description: If `true`, charge whenever solar production exceeds consumption and discharge to meet consumption otherwise.
              type: boolean
            fixedSchedule:
              title: Fixedschedule
              description: If specified, use a fixed schedule to control battery dispatch, charging as much as possible during `charge_tous` and discharging as much as possible during `discharge_tous`. Times of use (TOUs) should be specified using [Genability format](https://developer.genability.com/api-reference/tariff-api/time-of-use/), in either camel or snake case.
              allOf:
              - $ref: '#/components/schemas/FixedSchedule'
    TariffRatesResponse:
      required:
      - tariff
      - rates_cost_per_kwh
      properties:
        tariff:
          $ref: '#/components/schemas/Tariff'
        rates_cost_per_kwh:
          description: Timeseries with data array of $/kWh rates
          type: object
          required:
          - data
          - freq
          properties:
            data:
              description: Array of TimeSeriesItems indicating $/kWh rates for each requested time period
              type: array
              items:
                $ref: '#/components/schemas/TimeSeriesItem'
            freq:
              description: The interval of the TimeSeriesItems in the data array
              type: string
              enum:
              - 5m
              - 10m
              - 15m
              - 30m
              - 1h
      additionalProperties: false
    TariffApplicabilityAnswersRequestParams:
      required: []
      properties:
        utility_account_id:
          type: integer
          example: 12345
          description: The unique ID of the Utility Account for this tariff search. Optional if searching for tariffs by Genability `lse_id`/`zip_code`.
        zip_code:
          type: string
          example: '94706'
          description: The zip code of the site inside the LSE's territory. Must be provided if searching for tariffs by Genability `lse_id`/`zip_code`.
        lse_id:
          type: string
          example: gen_lse_734
          description: The ID of the Genability [load serving entity](https://developer.genability.com/api-reference/tariff-api/load-serving-entity/) prefixed with `gen_lse_`. Must be provided if searching for tariffs by Genability `lse_id`/`zip_code`.
        applicability_answers:
          type: array
          description: Site or customer-specific answers to applicability questions to determine tariff eligibility.
          items:
            $ref: '#/components/schemas/TariffApplicabilityAnswerSchema'
          example:
          - question_id: EV
            value: true
            data_type: YES_NO
          - question_id: SOLAR
            value: true
            data_type: YES_NO
          - question_id: ELECTRIC_HEAT
            value: false
            data_type: YES_NO
          - question_id: ELECTRIC_WATER
            value: false
            data_type: YES_NO
          - question_id: HEAT_PUMP
            value: false
            data_type: YES_NO
          - question_id: SENIOR_CITIZEN
            value: false
            data_type: YES_NO
          - question_id: LOW_INCOME
            value: false
            data_type: YES_NO
          - question_id: CA_CARE_CUSTOMER
            value: false
            data_type: YES_NO
          - question_id: CA_FERA
            value: false
            data_type: YES_NO
      additionalProperties: false
    TariffScenarioCostRequestTariffIdentificationParamError:
      required:
      - error
      properties:
        error:
          type: object
          required:
          - description
          - type
          - details
          properties:
            description:
              type: string
              enum:
              - Either utility_account_id or zip_code/main_tariff_id must be specified
            type:
              type: string
              enum:
              - BAD_REQUEST
            details:
              type: 'null'
      additionalProperties: false
    TariffScenarioDeviceEvChargingParams:
      description: Parameters for charging level and EV operation schedule
      required:
      - device
      - charging_availability
      - charging_power_kw
      - operation_schedule
      properties:
        device:
          type: string
          description: A value of `EV_CHARGING` indicates a future EV purchase.
          example: EV_CHARGING
          enum:
          - EV_CHARGING
        charging_availability:
          type: array
          description: Schedule of when the car is at home and able to be charged. `BASIC` charging will simulate a charging schedule assuming charging starts at the specified window start times (for example, at 18:00 when the driver comes home). `SMART` charging will simulate a charging schedule using our Calculate Smart Charging Schedule endpoint logic to charge during the cheapest hours on this tariff in the provided windows.
          items:
            $ref: '#/components/schemas/EvChargePlan'
        charging_power_kw:
          type: number
          example: 1.8
          description: This helps to determine the EVSE (electric vehicle supply equipment) level. 0.0 indicates no charging at home. 1.8kW or 2.4kW chargers are typical power levels for wall outlets (Level 1). 7.2kW or 9.6kW are typical charging powers for a Level 2 charger.
        operation_schedule:
          type: string
          enum:
          - BASIC
          - SMART
          example: SMART
          description: An operation schedule of `BASIC` charging will simulate a charging schedule assuming charging starts at the specified window start times (for example, at 18:00 when the driver comes home). `SMART` charging will simulate a charging schedule using our Calculate Smart Charging Schedule endpoint logic to charge during the cheapest hours on this tariff in the provided windows.
      additionalProperties: false
    TouPeriod:
      title: TouPeriod
      type: object
      properties:
        fromDayOfWeek:
          title: Fromdayofweek
          description: Day of the week on which this period begins (0 - 6, Monday - Sunday).
          default: 0
          minimum: 0
          maximum: 6
          type: integer
        toDayOfWeek:
          title: Todayofweek
          description: Day of the week after which this period ends (0 - 6, Monday - Sunday). End day is included in the period.
          default: 6
          minimum: 0
          maximum: 6
          type: integer
        fromHour:
          title: Fromhour
          description: Hour of the day on which this period begins (0 - 23).
          exclusiveMaximum: 24
          minimum: 0
          type: integer
        toHour:
          title: Tohour
          description: Hour of the day before which this period ends (0 - 24). End hour is not included in the period.
          minimum: 0
          maximum: 24
          type: integer
      required:
      - fromHour
      - toHour
    MostRecentTariff:
      allOf:
      - $ref: '#/components/schemas/Tariff'
      - description: The most recent Tariff seen on this utility account.
        required:
        - tariff_as_of_date
        properties:
          tariff_as_of_date:
            type: string
            format: date
            description: The statement date of the utility statement that reported use of this tariff.
            example: '2021-03-01'
            nullable: true
    ChargeCurvesTariffParamError:
      required:
      - error
      properties:
        error:
          type: object
          required:
          - description
          - type
          - details
          properties:
            description:
              type: string
              example: No tariff found matching ID
              enum:
              - No tariff found matching ID
              - 'Invalid tariff ID: must be of the form "gen_mtid_3220724"'
            type:
              type: string
              enum:
              - BAD_REQUEST
            details:
              type: object
              required:
              - main_tariff_id
              properties:
                main_tariff_id:
                  type: string
                  example: gen_tariff_000000
      additionalProperties: false
    SparkParamValidationError:
      required:
      - error
      properties:
        error:
          type: object
          required:
          - description
          - type
          - details
          properties:
            description:
              type: string
              enum:
              - Validation Error
            type:
              type: string
              enum:
              - BAD_REQUEST
            details:
              type: object
              nullable: true
      additionalProperties: false
    SmartChargeScheduleRequestBodyParams:
      required:
      - start_time
      - end_time
      - minutes_to_charge_complete
      properties:
        utility_account_id:
          description: (Beta - due to limited coverage) The unique ID of the utility account that this calculation is being run against. Either a `utility_account_id` or `main_tariff_id` is required for a valid request.
          type: integer
        main_tariff_id:
          type: string
          description: The Genability 'masterTariffId' unique identifier for this tariff. See [Genability documentation](https://developer.genability.com/api-reference/tariff-api/tariff/) for details. Either a `utility_account_id` or `main_tariff_id` is required for a valid request.
          example: gen_mtid_3331108
        start_time:
          description: 'ISO8601 timestamp of when the charge begins. Note that the timestamp will be rounded down to the start of latest charge block resolution.

            For example, if the `charge_block_resolution` is `1h` and the charging session starts at `2021-06-24T14:59:59Z`, the `start_time` used to calculate the curve''s cost will be normalized to `2021-06-24T14:00:00Z`. If the `charge_block_resolution` is `15m`, the `start_time` would be normalized to `2021-06-24T14:45:00Z`.

            This rounding technique eliminates ambiguity around charging that occurs across time-of-use on/mid/off-peak window boundaries.

            '
          type: string
          format: date-time
          example: '2021-03-18T22:00:00-07:00'
        end_time:
          description: ISO8601 datetime by which the charge must be complete.
          type: string
          format: date-time
          example: '2021-03-19T08:00:00-07:00'
        minutes_to_charge_complete:
          description: The number of minutes of charging required to complete a charge.
          type: integer
          example: 330
        charge_block_resolution:
          description: The duration of the charge blocks to use in the returned `charge_block_active` param.
          type: string
          enum:
          - 5m
          - 10m
          - 15m
          - 30m
          - 1h
          default: 1h
      additionalProperties: false
    TariffApplicabilityQuestionSchema:
      required:
      - id
      - user_question
      - answer_data_type
      properties:
        id:
          type: string
          description: String identifier for the applicability question
          example: LOW_INCOME
        user_question:
          type: string
          description: The user question corresponding to this tariff applicability
          example: Do you qualify for your utility's low income assistance program?
        user_question_details:
          description: The user question details corresponding to this tariff applicability
          example: Contact your utility for specific qualifications, but common criteria include Supplemental Security Income, Temporary Assistance to Needy Persons/Families, Safety Net Assistance, Food Stamps, or receiving a Home Energy Assistance Program grant in the preceding 12 months.
          type: string
          nullable: true
        answer_data_type:
          type: string
          description: Type of answer expected to be returned for this tariff applicability question
          example: YES_NO
      additionalProperties: false
  parameters:
    arcVersionInHeaderParam:
      name: Arcadia-Version
      in: header
