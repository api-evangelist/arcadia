aid: arcadia
name: Arcadia
description: >-
  Arcadia is the leading clean energy data platform that provides developers and
  businesses with programmatic access to utility billing data, real-time energy
  usage, and tariff intelligence across thousands of utility providers in the
  United States. The Arc Connect API enables applications to collect and
  synchronize utility account credentials, retrieve structured billing statements,
  and access granular interval meter data down to 15-minute readings. Arcadia's
  Plug API covers more than 95% of US utility accounts, supporting use cases
  including energy management, carbon accounting, solar savings analysis, EV
  charging optimization, and community solar enrollment. The platform also offers
  Signal for tariff rate calculation, Switch for plan recommendations, and
  DataHub for warehouse-native SQL access to aggregated energy datasets.
type: Index
