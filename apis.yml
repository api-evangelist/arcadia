apis:
  - name: Arcadia Plug API
    description: >-
      The Plug API provides programmatic access to utility account data including
      billing statements, meter listings, and granular interval usage readings.
      Developers can connect end users to their utility accounts via the Arc
      Connect component, then retrieve normalized billing and consumption data
      across thousands of US utility providers.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.arcadia.com/
    baseURL: https://api.arcadia.com
    tags:
      - Utility Data
      - Billing Statements
      - Meter Data
      - Interval Data
    properties:
      - type: Documentation
        url: https://docs.arcadia.com/
      - type: OpenAPI
        url: https://api.arcadia.com/openapi.yaml
      - type: OpenAPI
        url: openapi/arcadia-plug-openapi.yml
  - name: Arcadia Signal API
    description: >-
      Signal provides a tariff and energy rate calculation engine that allows
      developers to model the cost of any energy usage scenario against North
      American utility tariffs. It supports cost-benefit analysis, bill auditing,
      and energy procurement optimization by exposing the most comprehensive
      tariff rate database available.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.arcadia.com/
    baseURL: https://api.arcadia.com
    tags:
      - Tariff
      - Energy Rates
      - Cost Modeling
      - Utility Rates
    properties:
      - type: Documentation
        url: https://docs.arcadia.com/
  - name: Arcadia Switch API
    description: >-
      Switch enables rate plan optimization by identifying the best utility rate
      plan for a customer based on their actual usage patterns. It supports
      customer-facing energy plan recommendation workflows for utilities, brokers,
      and energy management platforms.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.arcadia.com/
    baseURL: https://api.arcadia.com
    tags:
      - Rate Plans
      - Energy Optimization
      - Utility Switching
    properties:
      - type: Documentation
        url: https://docs.arcadia.com/
  - name: Arcadia Utility Cloud API
    description: >-
      The Utility Cloud API provides enterprise-grade access to Arcadia's full
      energy data warehouse, enabling clients to extract structured data on
      business entities at scale. It supports integration with data platforms
      such as Snowflake and offers SQL-based access through DataHub for
      warehouse-native energy analytics.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.arcadia.com/v1.0-Utility-Cloud/docs/api-quick-start-guide
    baseURL: https://api.arcadia.com
    tags:
      - Enterprise
      - Data Warehouse
      - Utility Cloud
      - Snowflake
    properties:
      - type: Documentation
        url: https://docs.arcadia.com/v1.0-Utility-Cloud/docs/api-quick-start-guide
